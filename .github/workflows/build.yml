name: MyCompanyApp CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore MyCompanyApp.sln

    - name: Build solution
      run: dotnet build MyCompanyApp.sln --configuration Release --no-restore

    - name: Publish WPF App
      run: dotnet publish src/MyCompanyApp.Wpf/MyCompanyApp.Wpf.csproj -c Release -o publish

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyCompanyApp-build
        path: publish
