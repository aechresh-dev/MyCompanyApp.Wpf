name: MyCompanyApp Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:

    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore MyCompanyApp.sln

    - name: Build
      run: dotnet build MyCompanyApp.sln -c Release --no-restore

    - name: Publish WPF
      run: dotnet publish src/MyCompanyApp.Wpf/MyCompanyApp.Wpf.csproj -c Release -o publish

    - name: Create ZIP package
      run: Compress-Archive -Path publish\* -DestinationPath MyCompanyApp.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: MyCompanyApp.zip
      env:
        GITHUB_TOKEN: \cls{{ secrets.GITHUB_TOKEN }}
